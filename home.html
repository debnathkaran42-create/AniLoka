<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniLoka</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#090909;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
background:rgba(0,0,0,.85);
backdrop-filter:blur(15px);
z-index:999;
}

.logo{
font-size:28px;
font-weight:900;
}

.logo .ani{
color:white;
}

.logo .loka{
color:#FFD700;
}

.nav-icons{
display:flex;
gap:15px;
}

.icon{
font-size:22px;
cursor:pointer;
}

/* HERO */

.hero{
margin-top:70px;
height:70vh;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.overlay{
position:absolute;
bottom:0;
left:0;
right:0;
height:50%;
background:linear-gradient(
transparent,
#090909
);
}

.hero-content{
position:absolute;
bottom:80px;
left:20px;
z-index:5;
}

.hero-title{
font-size:40px;
font-weight:900;
}

.hero-btn{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#FFD700;
font-weight:bold;
cursor:pointer;
}

/* ROWS */

.section{
padding:25px 15px;
}

.section-title{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

.row{
display:flex;
overflow-x:auto;
gap:15px;
scroll-behavior:smooth;
}

.row::-webkit-scrollbar{
display:none;
}

.card{
min-width:160px;
height:230px;
background:linear-gradient(
135deg,
#222,
#111
);
border-radius:15px;
overflow:hidden;
position:relative;
transition:.4s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

.poster{
width:100%;
height:100%;
background:
linear-gradient(
135deg,
#FFD700,
#444
);
}

.card-title{
position:absolute;
bottom:10px;
left:10px;
font-size:14px;
font-weight:bold;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:65px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
z-index:999;
border-top:1px solid #222;
}

.nav-item{
text-align:center;
font-size:12px;
cursor:pointer;
}

.nav-item span{
display:block;
font-size:22px;
margin-bottom:3px;
}

/* DESKTOP */

@media(min-width:768px){

.hero{
height:85vh;
}

.card{
min-width:220px;
height:320px;
}

.hero-title{
font-size:60px;
}

.bottom-nav{
display:none;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
<span class="ani">Ani</span><span class="loka">Loka</span>
</div>

<script>

let current = 0;

const slides =
document.querySelectorAll(".slide");

setInterval(()=>{

slides[current]
.classList.remove("active");

current++;

if(current >= slides.length){

current = 0;

}

slides[current]
.classList.add("active");

},5000);

/* Open Anime Page */

function openAnime(){

window.location.href =
"anime-details.html";

}

</script>

</html>
