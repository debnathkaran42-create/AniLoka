<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AniLoka</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Background Glow */
.bg-glow{
position:absolute;
width:500px;
height:500px;
border-radius:50%;
background:radial-gradient(circle,
rgba(255,215,0,.4) 0%,
rgba(255,215,0,.15) 30%,
transparent 70%);
filter:blur(40px);
animation:pulse 3s infinite;
}

/* Logo Container */
.logo-container{
position:relative;
text-align:center;
z-index:2;
}

/* AniLoka Text */
.logo{
font-size:70px;
font-weight:900;
letter-spacing:3px;
opacity:0;
transform:scale(.6);
animation:logoReveal 2s forwards;
}

.ani{
color:white;
}

.loka{
color:#FFD700;
text-shadow:
0 0 10px #FFD700,
0 0 20px #FFD700,
0 0 40px #FFD700;
}

/* Shine Effect */
.shine{
position:absolute;
top:0;
left:-150%;
width:50%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.9),
transparent
);
transform:skewX(-25deg);
animation:shine 2s 1.8s forwards;
}

/* Subtitle */
.tagline{
margin-top:10px;
color:#999;
font-size:15px;
letter-spacing:2px;
opacity:0;
animation:fadeIn 1s 2s forwards;
}

/* Continue Button */
.enter-btn{
margin-top:30px;
padding:12px 30px;
background:#FFD700;
border:none;
border-radius:30px;
font-size:16px;
font-weight:bold;
cursor:pointer;
opacity:0;
transform:translateY(20px);
animation:showBtn 1s 3s forwards;
transition:.3s;
}

.enter-btn:hover{
transform:scale(1.08);
box-shadow:0 0 20px #FFD700;
}

/* Golden Particles */
.particle{
position:absolute;
background:#FFD700;
border-radius:50%;
opacity:.8;
animation:float linear infinite;
}

/* Animations */

@keyframes logoReveal{
0%{
opacity:0;
transform:scale(.5);
}
100%{
opacity:1;
transform:scale(1);
}
}

@keyframes shine{
100%{
left:170%;
}
}

@keyframes fadeIn{
to{
opacity:1;
}
}

@keyframes showBtn{
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes pulse{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.2);
}
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="logo-container">

<div style="position:relative;display:inline-block;">
<h1 class="logo">
<span class="ani">Ani</span><span class="loka">Loka</span>
</h1>
<div class="shine"></div>
</div>

<p class="tagline">
INDIAN ANIME STREAMING PLATFORM
</p>

<button class="enter-btn" onclick="enterSite()">
Enter AniLoka
</button>

</div>

<script>

/* Golden Particles */

for(let i=0;i<40;i++){

const particle=document.createElement("div");

particle.classList.add("particle");

particle.style.width=Math.random()*5+2+"px";
particle.style.height=particle.style.width;

particle.style.left=Math.random()*100+"vw";

particle.style.animationDuration=
(Math.random()*5+5)+"s";

particle.style.animationDelay=
Math.random()*5+"s";

document.body.appendChild(particle);
}

function enterSite(){

window.location.href = "home.html";

}

</script>

</body>
</html>
